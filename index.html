<!DOCTYPE html>
<html>
<head>
    <title>Kenya Online Writers</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Kenya Online Writers</h1>

<div class="container">

    <h2>Login</h2>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <p id="message"></p>

</div>

<div class="services">

    <h2>Available Services</h2>

    <button onclick="openService('Transcription Jobs')">Transcription Jobs</button>
    <button onclick="openService('Online Writing Jobs')">Online Writing Jobs</button>
    <button onclick="openService('Typing Jobs')">Typing Jobs</button>

</div>

<script src="script.js"></script>

</body>
</html>
